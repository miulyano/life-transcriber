services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      - cobalt
    volumes:
      - transcriber_tmp:/tmp/transcriber
      - ./bot/data:/app/bot/data:ro
    deploy:
      resources:
        limits:
          memory: 220m

  cobalt:
    image: ghcr.io/imputnet/cobalt:11
    restart: unless-stopped
    environment:
      API_URL: "http://cobalt:9000"
      # For Instagram outages caused by anonymous access being blocked:
      # COOKIE_PATH: "/cookies.json"
    # volumes:
    #   - ./cookies.json:/cookies.json:ro
    deploy:
      resources:
        limits:
          memory: 128m

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    env_file: .env
    restart: unless-stopped
    volumes:
      - webapp_tmp:/tmp/transcriber
    networks:
      - default
      - caddy_net
    deploy:
      resources:
        limits:
          memory: 400m

networks:
  caddy_net:
    external: true

volumes:
  transcriber_tmp:
  webapp_tmp:
